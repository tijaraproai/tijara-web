<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tijara</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
}

/* ===== INTRO SCREEN ===== */
.intro-screen{
position:fixed;
inset:0;
background:#000;
z-index:1000;
}

/* ===== HERO ===== */
.hero{
position:relative;
height:100vh;
width:100%;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
perspective:1200px;
}

/* Background Image */
.hero-img{
position:absolute;
inset:0;
background:url("https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=2000&q=80") center/cover no-repeat;
transform:scale(1.4);
filter:blur(20px);
opacity:0;
transition:2s cubic-bezier(.19,1,.22,1);
}

/* Overlay Dark */
.overlay{
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.6),rgba(0,0,0,.9));
}

/* Content */
.content{
position:relative;
text-align:center;
z-index:2;
transform:translateY(40px);
opacity:0;
transition:1.2s ease 1.5s;
}

.content h1{
font-size:3.5rem;
margin-bottom:20px;
}

.content p{
color:#ccc;
margin-bottom:40px;
font-size:1.2rem;
}

.btn{
padding:15px 50px;
background:white;
color:black;
border-radius:50px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* ACTIVE STATE */
.hero.active .hero-img{
transform:scale(1);
filter:blur(0px);
opacity:1;
}

.hero.active .content{
transform:translateY(0);
opacity:1;
}

</style>
</head>

<body>

<div class="intro-screen"></div>

<section class="hero">
<div class="hero-img"></div>
<div class="overlay"></div>

<div class="content">
<h1>مستقبل تجارتك يبدأ الآن</h1>
<p>منصة تجمع كل وسائل البيع في تجربة واحدة ذكية وسريعة</p>
<a href="products.html" class="btn">ابدأ الآن</a>
</div>

</section>

<script>

/* Delay before reveal */
setTimeout(()=>{
document.querySelector(".intro-screen").style.display="none";
document.querySelector(".hero").classList.add("active");
document.body.style.overflow="auto";
},1200);

/* Subtle 3D Mouse Effect */
const hero = document.querySelector(".hero");

document.addEventListener("mousemove",(e)=>{
let x = (window.innerWidth/2 - e.clientX)/40;
let y = (window.innerHeight/2 - e.clientY)/40;
hero.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
