<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سلة التسوق | FORYOU</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.cart-item{
background:#1e293b;
padding:20px;
margin:15px auto;
width:300px;
border-radius:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.checkout{
background:#22c55e;
color:white;
}

.remove{
background:#ef4444;
color:white;
}

#paypal-button-container{
margin-top:20px;
}

</style>

<!-- PAYPAL -->
<script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=TND"></script>

</head>

<body>

<h1>🛒 سلة التسوق</h1>

<div id="cart-container"></div>

<h2 id="total">المجموع: 0 د.ت</h2>

<button class="checkout" onclick="stripeCheckout()">الدفع عبر Stripe 💳</button>

<div id="paypal-button-container"></div>

<br><br>

<a href="products.html" style="color:#38bdf8;">⬅ العودة للمنتجات</a>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function renderCart(){

const container = document.getElementById("cart-container");
const totalEl = document.getElementById("total");

container.innerHTML="";
let total=0;

cart.forEach((item,index)=>{

total+=item.price;

container.innerHTML+=`

<div class="cart-item">

<h3>${item.name}</h3>

<p>${item.price} د.ت</p>

<button class="remove" onclick="removeItem(${index})">حذف</button>

</div>

`;

});

totalEl.innerText="المجموع: "+total+" د.ت";

}

function removeItem(index){

cart.splice(index,1);

saveCart();

renderCart();

}

renderCart();



/* STRIPE */

async function stripeCheckout(){

  function bankPayment(){

if(cart.length === 0){
alert("السلة فارغة");
return;
}

let message = "لإتمام الطلب قم بالتحويل إلى الحساب البنكي التالي:\n\n";

message += "البنك: BIAT\n";
message += "الاسم: Mohamed Achir\n";
message += "IBAN: TNXX XXXX XXXX XXXX XXXX\n\n";

message += "بعد التحويل أرسل رقم العملية لتأكيد الطلب.";

alert(message);

cart = [];

saveCart();

renderCart();
  }
let response = await fetch("/api/create-checkout-session",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({cart})
});

let data = await response.json();

window.location = data.url;

}



/* PAYPAL */

paypal.Buttons({

createOrder:function(data,actions){

let total=0;

cart.forEach(item=>{

total+=item.price;

});

return actions.order.create({

purchase_units:[{

amount:{

value:total

}

}]

});

},

onApprove:function(data,actions){

return actions.order.capture().then(function(details){

alert("تم الدفع بنجاح ✅");

cart=[];

saveCart();

renderCart();

});

}

}).render('#paypal-button-container');

</script>

</body>
</html>
