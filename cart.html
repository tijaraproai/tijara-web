<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السلة - Tijara</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">

<style>
body{
background:#000;
color:white;
font-family:'Cairo',sans-serif;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

#cart-container{
max-width:700px;
margin:auto;
}

.cart-item{
background:#111;
padding:20px;
margin-bottom:15px;
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 20px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

.remove-btn{
background:#ff3b3b;
color:white;
}

.checkout-btn{
background:white;
color:black;
display:block;
margin:30px auto;
}

#total{
text-align:center;
margin-top:20px;
font-size:1.5rem;
}

a{
display:block;
text-align:center;
margin-top:30px;
color:#ccc;
text-decoration:none;
}
</style>
</head>

<body>

<h1>سلة التسوق</h1>

<div id="cart-container"></div>

<h2 id="total"></h2>

<button class="checkout-btn" onclick="checkout()">إتمام الطلب</button>

<a href="products.html">العودة للمنتجات</a>

<script src="js/cart.js"></script>

</html>
