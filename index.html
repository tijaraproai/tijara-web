<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر مشروعي الفاخر</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{background:#0f172a;color:white;padding:20px}

h1,h2{text-align:center;margin:30px 0}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
max-width:1200px;
margin:auto;
}

.product{
background:#1e293b;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.product-content{
padding:15px;
text-align:center;
}

.price{color:#38bdf8;font-weight:bold;margin:10px 0}

button{
padding:8px 15px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
margin:5px;
}

.add-btn{background:#38bdf8;color:black}
.remove-btn{background:#ef4444;color:white}
.checkout-btn{background:#22c55e;color:black}

.section{
background:#1e293b;
padding:20px;
border-radius:15px;
margin:40px auto;
max-width:800px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:none;
}
</style>
</head>

<body>

<h1>🛍 متجر مشروعي الفاخر</h1>

<h2>منتجاتنا</h2>
<div class="grid" id="products"></div>

<div class="section">
<h2>🛒 سلة التسوق</h2>
<div id="cart"></div>
<h3 id="total">المجموع: 0 د.ت</h3>
<button class="checkout-btn" onclick="checkout()">إتمام الشراء</button>
</div>

<div class="section">
<h2>⚙ لوحة إدارة المنتجات</h2>
<input type="text" id="newName" placeholder="اسم المنتج">
<input type="number" id="newPrice" placeholder="السعر">
<input type="text" id="newImage" placeholder="رابط صورة المنتج">
<button class="add-btn" onclick="addProduct()">إضافة منتج</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{
name:"سماعات بلوتوث",
price:120,
image:"https://images.unsplash.com/photo-1518444028785-8fbcd101ebb9?auto=format&fit=crop&w=800&q=80"
},
{
name:"ساعة ذكية",
price:250,
image:"https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=800&q=80"
}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveProducts(){
localStorage.setItem("products",JSON.stringify(products));
}

function saveCart(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function renderProducts(){
const container=document.getElementById("products");
container.innerHTML="";
products.forEach((p,i)=>{
container.innerHTML+=`
<div class="product">
<img src="${p.image}">
<div class="product-content">
<h3>${p.name}</h3>
<div class="price">${p.price} د.ت</div>
<button class="add-btn" onclick="addToCart(${i})">أضف للسلة</button>
</div>
</div>`;
});
}

function renderCart(){
const container=document.getElementById("cart");
container.innerHTML="";
let total=0;

cart.forEach((item,i)=>{
total+=item.price;
container.innerHTML+=`
<p>${item.name} - ${item.price} د.ت 
<button class="remove-btn" onclick="removeFromCart(${i})">حذف</button></p>`;
});

document.getElementById("total").innerText="المجموع: "+total+" د.ت";
}

function addToCart(i){
cart.push(products[i]);
saveCart();
renderCart();
}

function removeFromCart(i){
cart.splice(i,1);
saveCart();
renderCart();
}

function checkout(){
if(cart.length===0){
alert("السلة فارغة");
return;
}
alert("تم الطلب بنجاح 🚀");
cart=[];
saveCart();
renderCart();
}

function addProduct(){
const name=document.getElementById("newName").value;
const price=parseFloat(document.getElementById("newPrice").value);
const image=document.getElementById("newImage").value;

if(!name||!price||!image){
alert("أكمل جميع البيانات");
return;
}

products.push({name,price,image});
saveProducts();
renderProducts();

document.getElementById("newName").value="";
document.getElementById("newPrice").value="";
document.getElementById("newImage").value="";
}

renderProducts();
renderCart();

</script>

</body>
</html>
