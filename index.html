<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tijara Web</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* ===== Intro Screen ===== */
.intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 2s ease 2s forwards;
}

.intro h1{
font-size:2rem;
letter-spacing:3px;
opacity:0;
animation:fadeIn 1.5s ease forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

/* ===== Hero ===== */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1556742049-0cfed4f6a45d') center/cover no-repeat;
position:relative;
}

.hero::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
z-index:2;
transform:translateY(40px);
opacity:0;
animation:slideUp 1.5s ease 2.2s forwards;
}

@keyframes slideUp{
to{
opacity:1;
transform:translateY(0);
}
}

.hero h1{
font-size:3.5rem;
margin-bottom:20px;
}

.hero p{
font-size:1.3rem;
margin-bottom:40px;
color:#ddd;
}

.btn{
background:#38bdf8;
color:#000;
padding:15px 40px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:#fff;
}

/* ===== Parallax Scroll Section ===== */
.section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
font-size:2rem;
}

</style>
</head>
<body>

<div class="intro">
<h1>Tijara Web</h1>
</div>

<section class="hero">
<div class="hero-content">
<h1>مستقبل التجارة الرقمية</h1>
<p>منصة ذكية تعيد تعريف التجارة الإلكترونية</p>
<a href="products.html" class="btn">ابدأ الآن</a>
</div>
</section>

<section class="section">
واجهة حديثة مدعومة بالذكاء
</section>

</body>
</html>
