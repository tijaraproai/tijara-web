<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForYou Shop</title>

  <!-- خط Cairo -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      padding: 0;
    }

    /* FEED الفيديوهات */
    #feed-container {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .video-item {
      height: 100vh;
      width: 100%;
      position: relative;
    }
    .video-item video {
      object-fit: cover;
      width: 100%;
      height: 100%;
    }
    .video-overlay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .buy-button {
      background-color: #ff0044;
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      color: white;
      font-weight: bold;
    }

    /* SEARCH */
    #searchBar {
      width: 90%;
      max-width: 600px;
      margin: 20px auto;
      display: block;
      padding: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    /* PRODUCTS GRID */
    .products {
      padding: 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }
    .product img {
      width: 100%;
      border-radius: 10px;
    }
    .product h3, .product p {
      margin: 5px 0;
    }
    .product button {
      background-color: #ff0044;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    /* SIDEBAR CART */
    #cartSidebar {
      position: fixed;
      top: 0;
      right: -350px;
      width: 350px;
      height: 100%;
      background-color: #f5f5f5;
      padding: 20px;
      box-shadow: -2px 0 10px rgba(0,0,0,0.2);
      transition: right 0.3s ease;
      z-index: 9999;
    }
    .closeCart {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background-color: #ff0044;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 10px;
      background-color: #222;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <!-- FEED الفيديوهات -->
  <div id="feed-container"></div>

  <!-- SEARCH -->
  <input type="text" id="searchBar" placeholder="ابحث عن المنتجات...">

  <!-- PRODUCTS -->
  <section class="products" id="products">
    <h2>منتجات مميزة</h2>
    <div class="product-grid" id="productGrid"></div>
  </section>

  <!-- SIDEBAR CART -->
  <div id="cartSidebar">
    <button class="closeCart" onclick="closeCart()">✖ إغلاق</button>
    <h2>سلة التسوق</h2>
    <div id="cartItems"></div>
    <h3 id="cartTotal">الإجمالي: 0 د.ت</h3>
    <button onclick="checkout()" class="btn">إتمام الشراء</button>
  </div>

  <!-- FOOTER -->
  <footer><p>© 2026 FORYOU SHOP</p></footer>

  <!-- سكربتات -->
  <script src="js/cart.js"></script>
  <script src="js/feed.js"></script>

  <!-- سكربت عرض المنتجات والبحث -->
  <script>
    const products = [
      {name:'سماعات بلوتوث',price:120,img:'https://images.unsplash.com/photo-1518444065439-e933c06ce9cd'},
      {name:'ساعة ذكية',price:250,img:'https://images.unsplash.com/photo-1546868871-7041f2a55e12'},
      {name:'كاميرا رقمية',price:500,img:'https://images.unsplash.com/photo-1519183071298-a2962e8b7f64'},
      {name:'حقيبة ظهر',price:180,img:'https://images.unsplash.com/photo-1596464716121-6c27c5e4b622'},
      {name:'هاتف ذكي',price:1200,img:'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9'}
    ];

    const productGrid = document.getElementById('productGrid');

    function renderProducts(filter=''){
      productGrid.innerHTML='';
      products.filter(p=>p.name.includes(filter)).forEach(p=>{
        const div = document.createElement('div');
        div.classList.add('product');
        div.innerHTML=`
          <img src="${p.img}">
          <div class="star-rating">⭐⭐⭐⭐⭐</div>
          <h3>${p.name}</h3>
          <p>${p.price} د.ت</p>
          <button onclick="addToCart('${p.name}',${p.price})">أضف للسلة</button>
        `;
        productGrid.appendChild(div);
      });
    }

    renderProducts();

    document.getElementById('searchBar').addEventListener('input',e=>{
      renderProducts(e.target.value);
    });
  </script>

</body>
</html>
