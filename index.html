<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tijara Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#020617;
}

.logo{
font-size:22px;
font-weight:800;
color:#38bdf8;
}

.nav-links a{
margin:0 10px;
text-decoration:none;
color:white;
font-weight:600;
}

.lang button{
margin-left:5px;
padding:5px 10px;
border:none;
cursor:pointer;
background:#38bdf8;
color:black;
border-radius:5px;
}

/* HERO */

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:42px;
margin-bottom:20px;
}

.hero p{
color:#cbd5f5;
margin-bottom:30px;
}

.btn{
background:#38bdf8;
color:black;
padding:12px 30px;
border-radius:30px;
text-decoration:none;
font-weight:700;
}

/* FEATURES */

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:60px 8%;
}

.card{
background:#1e293b;
padding:30px;
border-radius:15px;
text-align:center;
}

.card h3{
margin-bottom:10px;
color:#38bdf8;
}

footer{
text-align:center;
padding:30px;
background:#020617;
margin-top:40px;
}

</style>

</head>

<body>

<nav>

<div class="logo">TIJARA</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">Cart</a>
<a href="login.html">Login</a>
</div>

<div class="lang">
<button onclick="setLang('ar')">AR</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('fr')">FR</button>
</div>

</nav>

<section class="hero">

<h1 id="title">منصة تجارة عصرية</h1>

<p id="desc">
منصة تجارة إلكترونية حديثة وسريعة
</p>

<a href="products.html" class="btn" id="btn">
تصفح المنتجات
</a>

</section>

<section class="features">

<div class="card">
<h3 id="f1">سرعة</h3>
<p id="f1d">موقع سريع وخفيف</p>
</div>

<div class="card">
<h3 id="f2">أمان</h3>
<p id="f2d">حماية وموثوقية</p>
</div>

<div class="card">
<h3 id="f3">سهولة</h3>
<p id="f3d">تجربة استخدام بسيطة</p>
</div>

</section>

<footer>
TIJARA © 2026
</footer>

<script>

const translations = {

ar:{
title:"منصة تجارة عصرية",
desc:"منصة تجارة إلكترونية حديثة وسريعة",
btn:"تصفح المنتجات",
f1:"سرعة",
f1d:"موقع سريع وخفيف",
f2:"أمان",
f2d:"حماية وموثوقية",
f3:"سهولة",
f3d:"تجربة استخدام بسيطة"
},

en:{
title:"Modern Commerce Platform",
desc:"Fast and modern e-commerce experience",
btn:"Browse Products",
f1:"Speed",
f1d:"Fast and optimized platform",
f2:"Security",
f2d:"Secure and reliable",
f3:"Simplicity",
f3d:"Easy user experience"
},

fr:{
title:"Plateforme de Commerce Moderne",
desc:"Expérience e-commerce rapide",
btn:"Voir les produits",
f1:"Vitesse",
f1d:"Site rapide et léger",
f2:"Sécurité",
f2d:"Protection et fiabilité",
f3:"Simplicité",
f3d:"Utilisation facile"
}

}

function setLang(lang){

document.getElementById("title").innerText = translations[lang].title
document.getElementById("desc").innerText = translations[lang].desc
document.getElementById("btn").innerText = translations[lang].btn
document.getElementById("f1").innerText = translations[lang].f1
document.getElementById("f1d").innerText = translations[lang].f1d
document.getElementById("f2").innerText = translations[lang].f2
document.getElementById("f2d").innerText = translations[lang].f2d
document.getElementById("f3").innerText = translations[lang].f3
document.getElementById("f3d").innerText = translations[lang].f3d

}

</script>

</body>
</html>
