<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tijara Web</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">

<style>
:root{
--primary:#4f46e5;
--bg:#000;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
}

/* ===== INTRO SCREEN ===== */
.intro{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.intro h1{
font-size:2rem;
letter-spacing:6px;
opacity:0;
animation:logoReveal 1.5s ease forwards;
}

@keyframes logoReveal{
0%{opacity:0;transform:scale(0.8);}
100%{opacity:1;transform:scale(1);}
}

/* ===== HERO ===== */
.hero{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url("https://images.unsplash.com/photo-1556742049-0cfed4f6a45d") center/cover no-repeat;
transform:scale(1.2);
opacity:0;
transition:1.5s ease;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,0.8),rgba(0,0,0,0.9));
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero h1{
font-size:3.8rem;
margin-bottom:20px;
opacity:0;
transform:translateY(40px);
transition:1s ease;
}

.hero p{
color:#bbb;
font-size:1.2rem;
margin-bottom:40px;
opacity:0;
transform:translateY(40px);
transition:1s ease .2s;
}

.btn{
display:inline-block;
padding:15px 50px;
background:var(--primary);
color:white;
text-decoration:none;
border-radius:50px;
font-weight:bold;
box-shadow:0 10px 40px rgba(79,70,229,.5);
transition:.4s;
opacity:0;
transform:translateY(40px);
}

.btn:hover{
transform:scale(1.1);
}

/* ACTIVE STATE */
.hero.active{
opacity:1;
transform:scale(1);
}

.hero.active h1,
.hero.active p,
.hero.active .btn{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<div class="intro">
<h1>T I J A R A</h1>
</div>

<section class="hero">
<div class="hero-content">
<h1>منصة توحد تجارتك الرقمية</h1>
<p>كل مواقع التواصل والتجارة في تجربة واحدة ذكية وسريعة</p>
<a href="products.html" class="btn">ابدأ الآن</a>
</div>
</section>

<script>
setTimeout(()=>{
document.querySelector(".intro").style.display="none";
document.querySelector(".hero").classList.add("active");
document.body.style.overflow="auto";
},2000);
</script>

</body>
</html>
