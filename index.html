<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر مشروعي الفاخر - كامل</title>
<style>
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f5f5f5;margin:0;padding:0;}
header{background:#111;color:#fff;padding:1rem 2rem;position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;z-index:100;}
header h1{font-size:1.8rem;}
nav a{color:#fff;text-decoration:none;margin-left:1rem;position:relative;font-weight:500;}
nav a:hover::after{width:100%;}
nav a::after{content:'';position:absolute;width:0;height:2px;background:#ff3f3f;left:0;bottom:-3px;transition:0.3s;}
section{padding:2rem;max-width:1200px;margin:0 auto;}
h2,h3{margin-bottom:1rem;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:1.5rem;}
.card{background:#fff;border-radius:15px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 4px 10px rgba(0,0,0,0.1);transition:0.3s;}
.card img{width:100%;height:200px;object-fit:cover;transition:0.5s;}
.card:hover img{transform:scale(1.05);}
.card-content{padding:1rem;display:flex;flex-direction:column;}
.card-content h4{margin-bottom:0.5rem;}
.card-content p{margin-bottom:0.5rem;color:#555;}
.card-content strong{margin-bottom:0.5rem;color:#111;}
.card-content button{padding:0.5rem;border:none;background:#111;color:#fff;cursor:pointer;border-radius:5px;}
.card-content button:hover{background:#ff3f3f;transform:scale(1.05);}
#cart{background:#fff;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);margin-top:2rem;padding:1rem;}
#cart ul{list-style:none;margin-bottom:1rem;}
#cart li{margin-bottom:0.5rem;}
.admin-panel{background:#222;color:#fff;border-radius:10px;padding:1rem;margin-bottom:2rem;}
.admin-panel input, .admin-panel select{margin:0.3rem;padding:0.5rem;border-radius:5px;border:none;}
.admin-panel button{margin-top:0.5rem;padding:0.5rem;border:none;background:#ff3f3f;color:#fff;border-radius:5px;cursor:pointer;}
.admin-panel button:hover{background:#e63946;}
.orders{background:#fff;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.1);margin-top:2rem;padding:1rem;}
.orders h3{text-align:center;margin-bottom:1rem;}
.orders ul{list-style:none;}
.orders li{margin-bottom:0.5rem;}
</style>
</head>
<body>

<header>
<h1>مشروعي الفاخر</h1>
<nav>
<a href="#products">المنتجات</a>
<a href="#cart">سلة التسوق</a>
<a href="#admin">لوحة الإدارة</a>
<a href="#orders">الطلبات</a>
</nav>
</header>

<section id="products">
<h2>منتجاتنا المميزة</h2>
<div class="grid" id="productGrid">
<!-- المنتجات ستُضاف ديناميكياً -->
</div>
</section>

<section id="cart">
<h2>سلة التسوق</h2>
<ul id="cartItems"></ul>
<p id="totalPrice">المجموع: 0 دينار</p>
<button id="checkoutBtn">إتمام الشراء</button>
</section>

<section id="admin">
<h2>لوحة إدارة المنتجات</h2>
<div class="admin-panel">
<h3>إضافة منتج جديد</h3>
<input type="text" id="productName" placeholder="اسم المنتج">
<input type="number" id="productPrice" placeholder="السعر">
<input type="text" id="productDesc" placeholder="وصف المنتج">
<input type="text" id="productImage" placeholder="رابط الصورة">
<select id="productCategory">
<option value="electronics">إلكترونيات</option>
<option value="clothes">ملابس</option>
<option value="home">منزلية</option>
</select>
<button id="addProductBtn">أضف المنتج</button>
</div>
</section>

<section id="orders">
<h2>الطلبات</h2>
<div class="orders">
<ul id="orderList"></ul>
</div>
</section>

<footer>
<p>تواصل معنا: 53 048 531 | contact@myproject.com</p>
</footer>

<script src="https://js.stripe.com/v3/"></script>
<script>
const stripe = Stripe('pk_test_XXXXXXXXXXXXXXXXXXXX'); // ضع مفتاحك هنا
let products = [];
let cart = [];
let orders = [];

// Render Products
function renderProducts(){
const grid = document.getElementById('productGrid'); grid.innerHTML='';
products.forEach((p,i)=>{
const card=document.createElement('div'); card.className='card';
card.innerHTML=`<img src="${p.image}" alt="${p.name}">
<div class="card-content">
<h4>${p.name}</h4>
<p>${p.desc}</p>
<strong>السعر: ${p.price} دينار</strong>
<button onclick="addToCart(${i})">أضف للسلة</button>
</div>`;
grid.appendChild(card);
});
}

// Add to Cart
function addToCart(index){
cart.push(products[index]);
renderCart();
}
function renderCart(){
const list=document.getElementById('cartItems'); list.innerHTML=''; let total=0;
cart.forEach((item,i)=>{total+=item.price; list.innerHTML+=`<li>${item.name} - ${item.price} دينار <button onclick="removeItem(${i})">حذف</button></li>`;});
document.getElementById('totalPrice').textContent=`المجموع: ${total} دينار`;
}
function removeItem(i){cart.splice(i,1); renderCart();}

// Checkout
document.getElementById('checkoutBtn').addEventListener('click',async()=>{
if(cart.length===0){alert('السلة فارغة');return;}
const totalAmount = cart.reduce((a,b)=>a+b.price,0)*100; // بالدينار ×100 للـ Stripe
orders.push([...cart]); // حفظ الطلب
renderOrders();
cart=[]; renderCart();
// تجربة Checkout
alert('تمت عملية الشراء بنجاح! المجموع: '+totalAmount/100+' دينار');
});

// Render Orders
function renderOrders(){
const list=document.getElementById('orderList'); list.innerHTML='';
orders.forEach((order,i)=>{
list.innerHTML+=`<li>طلب ${i+1}: ${order.map(p=>p.name).join(', ')} - المجموع: ${order.reduce((a,b)=>a+b.price,0)} دينار</li>`;
});
}

// Admin - Add Product
document.getElementById('addProductBtn').addEventListener('click',()=>{
const name=document.getElementById('productName').value;
const price=parseFloat(document.getElementById('productPrice').value);
const desc=document.getElementById('productDesc').value;
const image=document.getElementById('productImage').value;
const category=document.getElementById('productCategory').value;
if(!name||!price||!desc||!image){alert('اكمل جميع الحقول');return;}
products.push({name,price,desc,image,category});
renderProducts();
document.getElementById('productName').value='';
document.getElementById('productPrice').value='';
document.getElementById('productDesc').value='';
document.getElementById('productImage').value='';
});
</script>
</body>
</html>
