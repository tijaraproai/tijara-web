<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForYou Shop</title>

<!-- خط Cairo -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
font-family:'Cairo',sans-serif;
background:#f5f5f5;
}

/* FEED */

#feed-container{
width:100%;
height:100vh;
overflow:hidden;
position:relative;
}

.video-item{
width:100%;
height:100vh;
position:relative;
}

.video-item video{
width:100%;
height:100%;
object-fit:cover;
}

.video-overlay{
position:absolute;
bottom:40px;
right:20px;
color:white;
display:flex;
flex-direction:column;
align-items:flex-end;
}

.buy-button{
background:#ff0044;
border:none;
padding:12px 18px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

/* SEARCH */

#searchBar{
width:90%;
max-width:600px;
margin:20px auto;
display:block;
padding:10px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
}

/* PRODUCTS */

.products{
padding:20px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:10px;
}

.product h3{
margin:5px 0;
}

.product button{
background:#ff0044;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

/* CART */

#cartSidebar{
position:fixed;
top:0;
right:-350px;
width:350px;
height:100%;
background:white;
padding:20px;
box-shadow:-2px 0 10px rgba(0,0,0,0.2);
transition:0.3s;
z-index:999;
}

.closeCart{
background:none;
border:none;
font-size:20px;
cursor:pointer;
}

.cart-item{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.btn{
width:100%;
padding:10px;
background:#ff0044;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

footer{
text-align:center;
background:#222;
color:white;
padding:10px;
margin-top:20px;
}

</style>

</head>

<body>

<!-- FEED -->
<div id="feed-container"></div>

<!-- SEARCH -->
<input type="text" id="searchBar" placeholder="ابحث عن المنتجات...">

<!-- PRODUCTS -->

<section class="products">

<h2>منتجات مميزة</h2>

<div class="product-grid" id="productGrid"></div>

</section>

<!-- CART -->

<div id="cartSidebar">

<button class="closeCart" onclick="closeCart()">✖ إغلاق</button>

<h2>سلة التسوق</h2>

<div id="cartItems"></div>

<h3 id="cartTotal">الإجمالي: 0 د.ت</h3>

<button onclick="checkout()" class="btn">إتمام الشراء</button>

</div>

<!-- FOOTER -->

<footer>

<p>© 2026 FORYOU SHOP</p>

</footer>

<!-- SCRIPTS -->

<script src="js/cart.js"></script>
<script src="js/feed.js"></script>

<script>

const products=[

{name:'سماعات بلوتوث',price:120,img:'https://images.unsplash.com/photo-1518444065439-e933c06ce9cd'},

{name:'ساعة ذكية',price:250,img:'https://images.unsplash.com/photo-1546868871-7041f2a55e12'},

{name:'كاميرا رقمية',price:500,img:'https://images.unsplash.com/photo-1519183071298-a2962e8b7f64'},

{name:'حقيبة ظهر',price:180,img:'https://images.unsplash.com/photo-1596464716121-6c27c5e4b622'},

{name:'هاتف ذكي',price:1200,img:'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9'}

];

const productGrid=document.getElementById("productGrid");

function renderProducts(filter=''){

productGrid.innerHTML='';

products

.filter(p=>p.name.includes(filter))

.forEach(p=>{

const div=document.createElement("div");

div.classList.add("product");

div.innerHTML=`

<img src="${p.img}">

<h3>${p.name}</h3>

<p>${p.price} د.ت</p>

<button onclick="addToCart('${p.name}',${p.price})">أضف للسلة</button>

`;

productGrid.appendChild(div);

});

}

renderProducts();

document.getElementById("searchBar").addEventListener("input",e=>{

renderProducts(e.target.value);

});

</script>

</body>
</html>
