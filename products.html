<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORYOU | المنتجات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:#0f172a;color:white;overflow-x:hidden;}
/* NAVBAR */
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 5%;background:rgba(0,0,0,0.7);position:sticky;top:0;z-index:1000;border-bottom:1px solid #333;}
.logo img{height:60px;width:auto;}
nav ul{display:flex;gap:25px;list-style:none;align-items:center;}
nav a{color:white;text-decoration:none;font-weight:bold;font-size:18px;transition:.3s;}
nav a:hover{color:#38bdf8;}
#cartCount{background:#ef4444;color:white;padding:2px 6px;border-radius:50%;font-size:14px;vertical-align:top;margin-left:4px;}

/* SEARCH BAR */
#searchBar{margin:40px 5%;padding:12px;width:calc(100%-10%);border-radius:10px;border:none;font-size:16px;outline:none;}

/* PRODUCTS */
.products{padding:80px 5%;text-align:center;}
.products h2{font-size:40px;margin-bottom:40px;}
.product-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;}
.product{background:#1e293b;padding:20px;border-radius:15px;transition:.3s;}
.product:hover{transform:translateY(-5px);}
.product img{width:100%;border-radius:10px;margin-bottom:15px;}
.product button{background:#38bdf8;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:bold;}
.star-rating{color:#facc15;margin-bottom:10px;}

/* SIDEBAR CART */
#cartSidebar{position:fixed;top:0;right:-350px;width:350px;height:100%;background:#1e293b;padding:20px;box-shadow:-2px 0 10px rgba(0,0,0,0.5);transition:.3s;overflow-y:auto;z-index:1001;}
#cartSidebar h2{margin-bottom:20px;}
#cartItems .cart-item{display:flex;justify-content:space-between;margin-bottom:15px;padding:10px;background:#111827;border-radius:10px;}
#cartSidebar button.closeCart{background:#ef4444;color:white;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;}

/* FOOTER */
footer{margin-top:80px;padding:40px;text-align:center;background:#020617;color:#94a3b8;}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="logo"><img src="images/logo.png" alt="FORYOU"></div>
  <ul>
    <li><a href="index.html">🏠</a></li>
    <li><a href="products.html">🛍</a></li>
    <li><a href="#" onclick="openCart()">🛒 <span id="cartCount">0</span></a></li>
    <li><a href="login.html">👤</a></li>
  </ul>
</nav>

<!-- SEARCH -->
<input type="text" id="searchBar" placeholder="ابحث عن المنتجات...">

<!-- PRODUCTS -->
<section class="products">
<h2>منتجاتنا 🛍</h2>
<div class="product-grid" id="productGrid"></div>
</section>

<!-- SIDEBAR CART -->
<div id="cartSidebar">
<button class="closeCart" onclick="closeCart()">✖ إغلاق</button>
<h2>سلة التسوق</h2>
<div id="cartItems"></div>
<h3 id="cartTotal">الإجمالي: 0 د.ت</h3>
<button onclick="checkout()" class="btn">إتمام الشراء</button>
</div>

<!-- FOOTER -->
<footer><p>© 2026 FORYOU PLATFORM</p></footer>

<script>
// بيانات المنتجات وهمية عالية الجودة
const products = [
{name:'سماعات بلوتوث',price:120,img:'https://images.unsplash.com/photo-1518444065439-e933c06ce9cd'},
{name:'ساعة ذكية',price:250,img:'https://images.unsplash.com/photo-1546868871-7041f2a55e12'},
{name:'كاميرا رقمية',price:500,img:'https://images.unsplash.com/photo-1519183071298-a2962e8b7f64'},
{name:'حقيبة ظهر',price:180,img:'https://images.unsplash.com/photo-1596464716121-6c27c5e4b622'},
{name:'هاتف ذكي',price:1200,img:'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9'}
];

// توليد المنتجات
const productGrid = document.getElementById('productGrid');
function renderProducts(filter=''){
  productGrid.innerHTML='';
  products.filter(p=>p.name.includes(filter)).forEach(p=>{
    const div=document.createElement('div');
    div.classList.add('product');
    div.innerHTML=`
      <img src="${p.img}">
      <div class="star-rating">⭐⭐⭐⭐⭐</div>
      <h3>${p.name}</h3>
      <p>${p.price} د.ت</p>
      <button onclick="addToCart('${p.name}',${p.price})">أضف للسلة</button>
    `;
    productGrid.appendChild(div);
  });
}
renderProducts();

// البحث المباشر
document.getElementById('searchBar').addEventListener('input',e=>{
  renderProducts(e.target.value);
});

// سلة التسوق
let cart = JSON.parse(localStorage.getItem("cart"))||[];

function updateCartCount(){document.getElementById('cartCount').innerText=cart.length;}
function openCart(){document.getElementById('cartSidebar').style.right='0';renderCart();}
function closeCart(){document.getElementById('cartSidebar').style.right='-350px';}

function addToCart(name,price){
  cart.push({name,price});
  localStorage.setItem('cart',JSON.stringify(cart));
  renderCart();updateCartCount();alert("تمت إضافة المنتج للسلة");
}
function renderCart(){
  const cartItems=document.getElementById('cartItems');
  const cartTotal=document.getElementById('cartTotal');
  cartItems.innerHTML='';
  let total=0;
  cart.forEach((item,index)=>{
    total+=item.price;
    const div=document.createElement('div');
    div.classList.add('cart-item');
    div.innerHTML=`<span>${item.name} - ${item.price} د.ت</span><button onclick="removeItem(${index})">حذف</button>`;
    cartItems.appendChild(div);
  });
  cartTotal.innerText='الإجمالي: '+total+' د.ت';
}
function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem('cart',JSON.stringify(cart));
  renderCart();updateCartCount();
}
function checkout(){
  if(cart.length===0){alert('السلة فارغة');return;}
  alert('تم الطلب بنجاح 🚀');
  cart=[];localStorage.setItem('cart',JSON.stringify(cart));
  renderCart();updateCartCount();
}
renderCart();updateCartCount();
</script>

</body>
</html>
